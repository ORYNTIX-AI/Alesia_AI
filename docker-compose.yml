name: ALesia_AI
services:
  app:
    container_name: ALesia_AI
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-0.0.27}
        APP_COMMIT: ${APP_COMMIT:-unknown}
        APP_BUILD_TIME: ${APP_BUILD_TIME:-unknown}
    environment:
      PORT: "3000"
      APP_CONFIG_PATH: /app/data/app-config.json
    env_file:
      - .env.production.local
    restart: unless-stopped
    networks:
      - alesia_ai_net
    ports:
      - "127.0.0.1:8200:3000"
    volumes:
      - ./runtime-data:/app/data
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  alesia_ai_net:
    name: alesia_ai_net
    driver: bridge
