<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9dee8"/>
      <stop offset="100%" stop-color="#c6ccd6"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8bec8"/>
      <stop offset="100%" stop-color="#aab1bc"/>
    </linearGradient>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#sky)"/>
  <rect y="620" width="1200" height="280" fill="url(#ground)"/>

  <g filter="url(#softBlur)" opacity="0.72" fill="#606976">
    <rect x="480" y="330" width="240" height="310" rx="8"/>
    <polygon points="600,160 690,330 510,330"/>
    <rect x="580" y="120" width="40" height="90" rx="6"/>
    <rect x="420" y="410" width="85" height="230" rx="6"/>
    <polygon points="462,315 510,410 414,410"/>
    <rect x="695" y="410" width="85" height="230" rx="6"/>
    <polygon points="737,315 785,410 689,410"/>
    <rect x="548" y="470" width="104" height="170" rx="52"/>
  </g>

  <g filter="url(#softBlur)" opacity="0.24" fill="#eff2f6">
    <circle cx="240" cy="210" r="110"/>
    <circle cx="980" cy="240" r="140"/>
  </g>
</svg>
